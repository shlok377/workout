<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker | Neumorphic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="container" id="capture-area">
        <header>
            <h1 class="neu-text">Workout Tracker</h1>
        </header>

        <section id="grid-section" class="neu-card">
            <h2 class="section-title">Activity Streak</h2>
            <div id="grid-wrapper">
                <div id="streak-grid" class="grid"></div>
            </div>
            <div class="legend">
                <span>Less</span>
                <div class="cell level-0"></div>
                <div class="cell level-1"></div>
                <div class="cell level-2"></div>
                <div class="cell level-3"></div>
                <div class="cell level-4"></div>
                <span>More</span>
            </div>
        </section>

        <section id="add-exercise-section" class="neu-card">
            <form id="exercise-form">
                <div class="neu-input-wrapper">
                    <input type="text" id="exercise-name" placeholder="Exercise Name" required>
                </div>
                <div class="input-row">
                    <div class="neu-input-wrapper">
                        <input type="number" id="sets" placeholder="Sets" min="1" required>
                    </div>
                    <div class="neu-input-wrapper">
                        <input type="number" id="reps" placeholder="Reps" min="1" required>
                    </div>
                </div>
                <button type="submit" class="neu-btn primary">Add Exercise</button>
            </form>
        </section>

        <section id="list-section" class="neu-card">
            <h2 class="section-title">Today's Routine</h2>
            <ul id="exercise-list"></ul>
        </section>

        <div id="share-container" data-html2canvas-ignore>
            <button id="share-btn" class="neu-btn primary" onclick="shareProgress()">
                Share Progress 📸
            </button>
        </div>
    </div>

    <!-- Modal for editing -->
    <div id="edit-modal" class="modal">
        <div class="modal-content neu-card">
            <h3>Edit Exercise</h3>
            <div class="neu-input-wrapper">
                <input type="text" id="edit-name" placeholder="Exercise Name">
            </div>
            <div class="input-row">
                <div class="neu-input-wrapper">
                    <input type="number" id="edit-sets" placeholder="Sets" min="1">
                </div>
                <div class="neu-input-wrapper">
                    <input type="number" id="edit-reps" placeholder="Reps" min="1">
                </div>
            </div>
            <div class="modal-buttons">
                <button id="save-edit" class="neu-btn primary">Save</button>
                <button id="cancel-edit" class="neu-btn secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
